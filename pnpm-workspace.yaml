packages:
  - "apps/*"
  - "apps/caelus/*"
  - "packages/*"
injectWorkspacePackages: true
allowBuilds:
  '@sentry/cli': true
  esbuild: true
  protobufjs: true
  sharp: true
minimumReleaseAgeExclude:
  - "@discordjs/collection"
  - "@discordjs/core"
  - "@discordjs/rest"
  - "@discordjs/util"
  - "@discordjs/ws"
